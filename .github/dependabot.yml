version: 2
updates:
  # JS/TS dependencies. The "npm" ecosystem covers pnpm workspaces (reads pnpm-lock.yaml).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev-tooling bumps into a single PR to cut review noise.
      dev-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  # Keep GitHub Actions (including the local composite action) patched.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
