name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# These job names are the REQUIRED status checks referenced by the `main` branch ruleset.
# If you rename a job here, update the ruleset (see .github/ or repo settings) to match.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      # Coverage thresholds are enforced inside the Vitest config (see packages/shared).
      - run: pnpm test

  # The @webhook-co/db package is excluded from `pnpm test` (it needs a real Postgres
  # with real non-owner roles to exercise RLS / FORCE / the ingest function / the audit
  # chain). This job provides that Postgres and runs the schema + RLS + migration-
  # reversibility suite. POSTGRES_HOST_AUTH_METHOD=trust mirrors the local --auth=trust
  # harness so the test roles (webhook_owner/app/ingest) connect without passwords (no
  # secrets in CI); each test file creates its own database on the service for isolation.
  test-db:
    name: test-db
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - name: Install dbmate
        env:
          DBMATE_SHA256: dfd4027141b6e4357158099bdfe6c02b286af70f8e49057937744cf80b38ea1c
        run: |
          curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/download/v2.33.0/dbmate-linux-amd64
          echo "${DBMATE_SHA256}  /usr/local/bin/dbmate" | sha256sum -c -
          chmod +x /usr/local/bin/dbmate
          dbmate --version
      # Drift guard: the checked-in Better Auth schema must match what the installed
      # plugins actually generate. The generator reads apps/auth/src/auth.ts (which
      # imports the installed better-auth + @better-auth/api-key) and emits the full
      # schema against an empty DB; we diff that against the source-of-truth file that
      # migration 0001 is derived from. The CLI runs ephemerally via `pnpm dlx` — it is
      # deliberately NOT a tracked dep (it hard-pins an older better-auth); see
      # apps/auth/package.json. Catches both api-key plugin drift and any new core
      # identity columns a better-auth upgrade introduces.
      - name: Better Auth schema drift guard
        run: |
          psql "postgres://postgres@localhost:5432/postgres" -c 'create database auth_schema_check'
          ( cd apps/auth && DATABASE_URL="postgres://postgres@localhost:5432/auth_schema_check" \
            pnpm dlx @better-auth/cli@latest generate --config src/auth.ts --yes \
            --output "$RUNNER_TEMP/better-auth.schema.sql" )
          diff -u packages/db/db/migrations/.better-auth.schema.sql "$RUNNER_TEMP/better-auth.schema.sql"
      - run: pnpm test:db

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Builds the standalone `wbhk` CLI binary with `bun build --compile` and proves shell completion
  # works from THAT binary — the one integration the static gate (vitest/tsc) can't cover, since the
  # completion hook + the bundle's source-resolution only exist in the compiled artifact. bun is
  # installed via the official script (a run step, not a 3rd-party marketplace action) and pinned.
  # `node scripts/bundle.mjs` moves the typecheck-only tsconfig aside so bun resolves the workspace
  # deps to source (see that script). Not yet a required check — add it to the `main` ruleset to gate.
  completion-smoke:
    name: completion-smoke
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      # Version-pinned, NOT SHA-pinned (unlike the dbmate install above): bun's official installer
      # fetches the version-tagged release, and we don't carry a per-platform archive hash. Deliberate
      # delta — this job is CI-only, references no secrets (contents: read), and the binary it builds is
      # a smoke artifact that is never shipped to users, so the blast radius is build-time only.
      - name: Install bun (version-pinned)
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
      - name: Build the standalone wbhk binary
        run: |
          rm -f packages/cli/dist/wbhk   # never assert against a stale artifact from a reused workspace
          pnpm --filter @webhook-co/cli run bundle
      - name: Completion hook fires from the compiled binary
        run: |
          BIN=packages/cli/dist/wbhk
          test -x "$BIN"
          # The emitted bash script registers the completion function…
          "$BIN" completion bash | grep -q "complete -F _wbhk_complete wbhk"
          # …and the hidden engine returns live proposals (filtered to the partial).
          "$BIN" __complete -- ev | grep -qx "events"
          "$BIN" __complete -- events "" | grep -qx "list"
          "$BIN" __complete -- whoami -- | grep -q -- "--output"
          echo "completion hook OK (compiled binary)"

  # Bundle apps/auth for Cloudflare Workers and validate the full deploy shape. The `build` job's
  # `next build` does NOT cover the worker bundle, where workerd-only resolution issues surface (e.g.
  # pg-cloudflare, @better-auth/core's workerd `instrumentation` entry). `deploy:dry` runs the OpenNext
  # workerd build AND `wrangler deploy --dry-run`, which bundles Lane C's src/worker.ts entry (the
  # OAuthProvider wrapping the OpenNext handler — A2b-1) — so the OAuth-issuer mount is gated here too.
  # The turbo step builds the workspace deps' dist (the tsconfig-paths redirect targets) first.
  build-cf:
    name: build-cf
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm exec turbo run build --filter=@webhook-co/auth
      - run: pnpm -C apps/auth deploy:dry

  # Builds the static marketing export and asserts the emitted out/index.html <head> against the
  # SEO rule set (canonical/OG/twitter/robots/JSON-LD/lang present and consistent; anchor targets
  # resolve). Structural problems fail the build; authoring guidelines (title/description length)
  # are warnings. Add this job to the `main` ruleset's required checks to make it blocking.
  seo-html-check:
    name: seo-html-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm --filter @webhook-co/www build
      - run: pnpm --filter @webhook-co/www test:seo

  # Real-browser accessibility gate: builds the static export, serves it, and runs axe-core in
  # Chromium across the homepage's interactive states. This is the only layer that sees real
  # layout, so the only one that catches color contrast. Add to the `main` ruleset's required
  # checks to make it blocking.
  a11y-e2e:
    name: a11y-e2e
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm --filter @webhook-co/www build
      - run: pnpm --filter @webhook-co/www exec playwright install --with-deps chromium
      - run: pnpm --filter @webhook-co/www test:a11y

  # Lighthouse-CI budget gate over the static export. Blocks on the deterministic budgets (SEO
  # category, CLS, total byte weight); perf / LCP / a11y-category are warn-only (lab-variable —
  # the a11y-e2e job above is the hard a11y gate). Uses the Chrome preinstalled on the runner.
  # Add to required checks to make it blocking.
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm --filter @webhook-co/www build
      - run: pnpm --filter @webhook-co/www test:lighthouse

  no-skipped-tests:
    name: no-skipped-tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm run no-skipped-tests

  # Enforces the Node<->Workers tsconfig boundary convention: a cross-boundary internal
  # dependency edge must redirect the dep to its built dist *.d.ts, never recompile its source
  # across the lib boundary. Keeps a new package from silently reintroducing the friction.
  tsconfig-boundary:
    name: tsconfig-boundary
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm run tsconfig-boundary

  # Enforces the app. dashboard's Data-Access-Layer gate (ADR-0023): every bypassable server
  # entry point (route handlers, "use server" actions) must call verifySession() or carry a
  # `// dal-gate-allow:` marker, and the (app) render gate must exist. The dashboard is private —
  # this keeps a new ungated tenant-data path from silently shipping.
  dal-gate-guard:
    name: dal-gate-guard
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: pnpm run dal-gate-guard

  # Dependency vulnerability audit. CRITICAL advisories are blocking (this is a crypto/auth
  # surface — a known-critical transitive vuln must never auto-merge); HIGH stays advisory so
  # routine transitive advisories don't wedge unrelated PRs (Dependabot opens fix PRs).
  audit:
    name: audit
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - name: Audit (critical — blocking)
        run: pnpm audit --prod --audit-level=critical
      - name: Audit (high — advisory)
        run: pnpm audit --prod --audit-level=high || true
