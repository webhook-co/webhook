name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# These job names are the REQUIRED status checks referenced by the `main` branch ruleset.
# If you rename a job here, update the ruleset (see .github/ or repo settings) to match.

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Coverage thresholds are enforced inside the Vitest config (see packages/shared).
      - run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build

  no-skipped-tests:
    name: no-skipped-tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run no-skipped-tests

  # Dependency vulnerability audit. Non-blocking (advisories on transitive deps should not
  # wedge unrelated PRs); Dependabot opens PRs for fixes. Not a required status check.
  audit:
    name: audit
    runs-on: ubuntu-latest
    needs: install
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm audit --prod --audit-level=high
