name: deploy-auth
# CD for the auth issuer Worker (apps/auth -> auth.webhook.co). Like deploy-web.yml, apps/auth is a dynamic
# OpenNext SSR Worker (main = src/worker.ts, @cloudflare/workers-oauth-provider wrapping the OpenNext
# handler), so this BUILDS the worker (`opennextjs-cloudflare build`) before deploying. It calls wrangler
# directly via pnpm (third-party Marketplace actions are blocked by org policy); only actions/* are used,
# SHA-pinned.
#
# The committed apps/auth/wrangler.jsonc carries PLACEHOLDER ids (no real ids — no-secrets). The generator
# (scripts/gen-wrangler-prod.mjs) reads the resource ids from repo VARIABLES + injects account_id /
# workers_dev:false / routes (auth.webhook.co custom domain) / secrets_store_secrets (BETTER_AUTH_SECRET,
# CREDENTIAL_PEPPER, AUDIT_CHAIN_HMAC_KEY, CONSENT_TICKET_KEY, the Google/GitHub OAuth creds, RESEND_API_KEY),
# emitting the gitignored apps/auth/wrangler.prod.jsonc the deploy reads. Secret VALUES never enter CI —
# only the CF token (secret) + the non-secret ids/store id.
#
#   push to main / dispatch from main -> build, generate, then `wrangler deploy` (production)
#   pull_request                      -> build, generate, then `wrangler deploy --dry-run` (validates the
#                                        config + the worker bundle + binding resolution without deploying)
#
# NOT a required status check (lives outside ci.yml); a deploy failure never blocks a merge. The custom
# domain is bound once at the zone — a normal deploy only refreshes the Worker + its assets.
on:
  push:
    branches: [main]
    paths:
      - "apps/auth/**"
      - "packages/**"
      - "scripts/gen-wrangler-prod.mjs"
      - ".github/workflows/deploy-auth.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/auth/**"
      - "packages/**"
      - "scripts/gen-wrangler-prod.mjs"
      - ".github/workflows/deploy-auth.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: deploy-auth-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    name: deploy-auth
    runs-on: ubuntu-latest
    # Same-repo only: fork PRs don't receive secrets/vars, so a deploy/dry-run can't authenticate.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SECRETS_STORE_ID: ${{ vars.SECRETS_STORE_ID }}
      # The generator reqEnv()s every app's ids (it emits all apps each run) — provide the full set.
      HYPERDRIVE_TENANT_ID: ${{ vars.HYPERDRIVE_TENANT_ID }}
      HYPERDRIVE_CACHED_ID: ${{ vars.HYPERDRIVE_CACHED_ID }}
      HYPERDRIVE_ANCHOR_ID: ${{ vars.HYPERDRIVE_ANCHOR_ID }}
      HYPERDRIVE_RECONCILER_ID: ${{ vars.HYPERDRIVE_RECONCILER_ID }}
      HYPERDRIVE_AUTHN_ID: ${{ vars.HYPERDRIVE_AUTHN_ID }}
      HYPERDRIVE_INGEST_ID: ${{ vars.HYPERDRIVE_INGEST_ID }}
      HYPERDRIVE_AUTH_ID: ${{ vars.HYPERDRIVE_AUTH_ID }}
      HYPERDRIVE_SWEEPER_ID: ${{ vars.HYPERDRIVE_SWEEPER_ID }}
      KV_CONFIG_ID: ${{ vars.KV_CONFIG_ID }}
      KV_AUTHZ_ID: ${{ vars.KV_AUTHZ_ID }}
      AUTH_OAUTH_KV_ID: ${{ vars.AUTH_OAUTH_KV_ID }}
      AUTH_DEVICE_KV_ID: ${{ vars.AUTH_DEVICE_KV_ID }}
      AUTH_RATELIMIT_KV_ID: ${{ vars.AUTH_RATELIMIT_KV_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # apps/auth's OpenNext build type-checks against the workspace deps' built .d.ts (the tsconfig
      # dist-redirects for the WebCrypto/KVNamespace helpers), so build their dist first.
      - name: Build workspace deps
        run: pnpm exec turbo run build --filter=@webhook-co/auth^...
      - name: Build the OpenNext worker
        run: pnpm --filter @webhook-co/auth build:cf
      - name: Generate prod wrangler config (overlay)
        run: node scripts/gen-wrangler-prod.mjs
      - name: Deploy production (auth.webhook.co)
        # main-only: a push to main, or a workflow_dispatch with main selected. Without the ref guard a
        # dispatch from a feature branch would ship unreviewed code straight to prod — keep the gate real.
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: pnpm --filter @webhook-co/auth exec wrangler deploy -c wrangler.prod.jsonc
      - name: Validate deploy (dry-run)
        if: github.event_name == 'pull_request'
        run: pnpm --filter @webhook-co/auth exec wrangler deploy --dry-run -c wrangler.prod.jsonc
