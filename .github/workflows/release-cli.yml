# Release the `wbhk` CLI. Triggered by a `cli-vX.Y.Z` tag (or a manual dispatch for testing). DIST-3
# SKELETON: builds the host platform only + uploads to a DRAFT GitHub Release — proves the pipeline
# end-to-end before DIST-4 adds the cross-compile matrix, DIST-6 the npm publish, and DIST-8/9 signing.
# A draft is never public until someone publishes it, so pushing a tag / dispatching is safe to test.
# Calls tooling directly (bun installer + the `gh` CLI) — the org restricts Actions to GitHub-owned
# publishers, so no marketplace actions (mirrors ci.yml + the deploy CDs).
name: release-cli

on:
  push:
    tags: ["cli-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 0.3.0 (produces a DRAFT release tagged cli-v<version>)"
        required: true

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # OIDC for npm provenance (`npm publish`) + the binary build attestation
  attestations: write # sigstore-signed SLSA build provenance for the binaries (DIST-7)

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  release:
    name: release (all platforms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup

      # Version-pinned (not SHA-pinned) bun installer — same rationale as ci.yml's completion-smoke job.
      - name: Install bun (version-pinned)
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      # User-controlled values (the dispatch input) flow through env, never `${{ }}`-interpolated into the
      # script — that would be a shell-injection vector. EVENT_NAME is a trusted GitHub context.
      - name: Resolve version + tag from the trigger
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${REF_NAME#cli-v}" # tag is cli-vX.Y.Z
          fi
          # Guard against a malformed tag/input (a bad version would mis-stamp the binary). After this the
          # value is constrained to [0-9A-Za-z.+-], so it's safe to use in later steps.
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$' \
            || { echo "::error::not a valid version: '$VERSION' (expected X.Y.Z, tag cli-vX.Y.Z)"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=cli-v$VERSION" >> "$GITHUB_OUTPUT"

      # Cross-compile EVERY platform from this one runner (DIST-4) → packages/cli/out/wbhk-* + checksums.txt.
      - name: Build all platform binaries
        env:
          WBHK_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: node packages/cli/scripts/release-build.mjs

      - name: Smoke the stamped version (native linux-x64 binary)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          got="$(packages/cli/out/wbhk-linux-x64 --version)"
          test "$got" = "$VERSION" \
            || { echo "::error::version mismatch: binary says '$got', expected '$VERSION'"; exit 1; }

      # Sigstore-signed SLSA build provenance for every released binary (DIST-7). `subject-checksums` reads
      # checksums.txt (sha256sum format) and attests each listed binary's digest in ONE step. The attestation
      # is stored on GitHub (sigstore/Rekor-backed) — verify with `gh attestation verify <bin> --repo
      # webhook-co/webhook`. GitHub-OWNED action (allowed by the org's github_owned_allowed policy), SHA-pinned.
      # Real tags only (a workflow_dispatch test shouldn't mint provenance for a throwaway build).
      - name: Attest build provenance (sigstore + SLSA)
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: packages/cli/out/checksums.txt

      # Build the publishable npm package (DIST-6) — a node-runnable bundle (NOT the compiled binary) →
      # packages/cli/npm/. This always runs (build + smoke below) so the npm path is exercised every release,
      # even before publishing is enabled.
      - name: Build the npm package
        env:
          WBHK_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: node packages/cli/scripts/npm-build.mjs

      - name: Smoke the npm package (plain node)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          got="$(node packages/cli/npm/dist/bin.js --version)"
          test "$got" = "$VERSION" \
            || { echo "::error::npm bundle version mismatch: says '$got', expected '$VERSION'"; exit 1; }

      # Create the binary DRAFT release FIRST — before the npm publish — so the (P1) binaries always land even
      # if npm has an issue (e.g. a name-policy reject). The shell expands the glob to the explicit asset list.
      - name: Create / update the DRAFT GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" packages/cli/out/wbhk-* packages/cli/out/checksums.txt --clobber
          else
            gh release create "$TAG" packages/cli/out/wbhk-* packages/cli/out/checksums.txt \
              --draft \
              --title "wbhk $VERSION" \
              --notes "Draft built by release-cli — darwin arm64/x64, linux x64/arm64, windows x64 + checksums.txt. The npm package (@webhook-co/cli) publishes automatically when NPM_TOKEN is configured (with provenance); signing lands in a later distribution phase. Review + publish manually."
          fi
          echo "Draft release ready for $TAG — review + publish from the Releases page."

      # Publish gate: only on a real tag PUSH and only when NPM_TOKEN is configured (inert otherwise — the
      # build + smoke above still run every time), so the first npm publish is a deliberate human action.
      - name: Resolve the npm-publish gate
        id: npmgate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$NPM_TOKEN" ] && [ "$EVENT_NAME" = "push" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm publish skipped (no NPM_TOKEN, or not a tag push)"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (with provenance)
        if: steps.npmgate.outputs.publish == 'true'
        working-directory: packages/cli/npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # publishConfig.provenance:true in the generated package.json + id-token:write → npm emits the
          # provenance attestation automatically (no flag needed). Requires npm >= 9.5 (Node 20 ships npm 10).
          npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
          npm publish
          echo "Published @webhook-co/cli@$VERSION to npm with provenance."
