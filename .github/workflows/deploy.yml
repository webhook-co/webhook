name: deploy-wedge

# CD for the wedge Workers (engine -> wbhk.my, api -> api.webhook.co, mcp -> mcp.webhook.co).
# Mirrors deploy-www.yml: third-party Marketplace actions are blocked by org policy, so this calls
# wrangler directly via pnpm (wrangler is a root devDep); only actions/* are used, SHA-pinned.
#
# The committed apps/<app>/wrangler.jsonc are placeholders (no real ids — no-secrets). The generator
# (scripts/gen-wrangler-prod.mjs) reads the resource ids from repo VARIABLES + injects account_id /
# workers_dev:false / routes / secrets_store_secrets, emitting the gitignored wrangler.prod.jsonc that
# the deploy reads. Secret VALUES never enter CI — only the CF token (secret) + the non-secret ids.
#
#   push to main / dispatch from main -> generate, then `wrangler deploy` all three (production)
#   pull_request                   -> generate, then `wrangler deploy --dry-run` (validates config +
#                                     bundle without deploying)
#
# NOT a required status check (lives outside ci.yml); a deploy failure never blocks a merge. Custom
# domains are bound once at the zone (human-reviewed) — a normal deploy only refreshes the Worker.

on:
  push:
    branches: [main]
    paths:
      - "apps/engine/**"
      - "apps/api/**"
      - "apps/mcp/**"
      - "packages/**"
      - "scripts/gen-wrangler-prod.mjs"
      - ".github/workflows/deploy.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/engine/**"
      - "apps/api/**"
      - "apps/mcp/**"
      - "packages/**"
      - "scripts/gen-wrangler-prod.mjs"
      - ".github/workflows/deploy.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-wedge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-wedge
    runs-on: ubuntu-latest
    # Same-repo only: fork PRs don't receive secrets/vars, so a deploy/dry-run can't authenticate.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SECRETS_STORE_ID: ${{ vars.SECRETS_STORE_ID }}
      HYPERDRIVE_TENANT_ID: ${{ vars.HYPERDRIVE_TENANT_ID }}
      HYPERDRIVE_CACHED_ID: ${{ vars.HYPERDRIVE_CACHED_ID }}
      HYPERDRIVE_ANCHOR_ID: ${{ vars.HYPERDRIVE_ANCHOR_ID }}
      HYPERDRIVE_RECONCILER_ID: ${{ vars.HYPERDRIVE_RECONCILER_ID }}
      HYPERDRIVE_AUTHN_ID: ${{ vars.HYPERDRIVE_AUTHN_ID }}
      HYPERDRIVE_INGEST_ID: ${{ vars.HYPERDRIVE_INGEST_ID }}
      KV_CONFIG_ID: ${{ vars.KV_CONFIG_ID }}
      KV_AUTHZ_ID: ${{ vars.KV_AUTHZ_ID }}
      OAUTH_KV_ID: ${{ vars.OAUTH_KV_ID }}
      # gen-wrangler-prod.mjs emits every app (incl. auth) each run + reqEnv()s its ids — provide auth's too,
      # even though this workflow only deploys engine/api/mcp. (deploy-auth.yml deploys auth.)
      HYPERDRIVE_AUTH_ID: ${{ vars.HYPERDRIVE_AUTH_ID }}
      HYPERDRIVE_SWEEPER_ID: ${{ vars.HYPERDRIVE_SWEEPER_ID }}
      AUTH_OAUTH_KV_ID: ${{ vars.AUTH_OAUTH_KV_ID }}
      AUTH_DEVICE_KV_ID: ${{ vars.AUTH_DEVICE_KV_ID }}
      AUTH_RATELIMIT_KV_ID: ${{ vars.AUTH_RATELIMIT_KV_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Migration guard (auto-deploy must not outrun a manual migration)
        id: migguard
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          # Migrations are applied MANUALLY (dbmate up as webhook_owner), decoupled from this CD. If a push
          # changes a migration, the new code may depend on a prod schema that isn't applied yet (e.g. the
          # engine's ingest_event arity, getEvent's columns). Skip the AUTO deploy and require an explicit
          # workflow_dispatch AFTER the migration is applied — so new code never runs against an un-migrated
          # prod schema. (Prevents the S8 Slice 1 #300 / S3 #299 gap, where code deployed before its migration.)
          # FAIL CLOSED: if the compare API can't be reached, block — recovery is the same workflow_dispatch,
          # so a transient API error can never let a migration-bearing change auto-deploy past the guard.
          if ! changed=$(gh api "repos/${REPO}/compare/${BEFORE_SHA}...${AFTER_SHA}" --jq '.files[].filename'); then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Auto-deploy skipped (migration check failed)::Could not query the compare API to check for migration changes — blocking fail-safe. Confirm prod migrations are applied, then deploy via Run workflow (workflow_dispatch)."
          elif printf '%s\n' "$changed" | grep -qE '^packages/db/db/migrations/.+\.sql$'; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "::warning title=Auto-deploy skipped (migration change)::Apply the new migration to prod FIRST (dbmate up as webhook_owner), then deploy via Run workflow (workflow_dispatch). Skipped so new code never runs against an un-migrated prod schema."
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate prod wrangler configs (overlay)
        run: node scripts/gen-wrangler-prod.mjs
      - name: Deploy production (engine / api / mcp)
        # main-only: a push to main, or a workflow_dispatch with main selected. Without the ref guard a
        # dispatch from a feature branch would ship unreviewed code straight to prod — keep the gate real.
        # The migration guard blocks a PUSH that changed a migration (workflow_dispatch bypasses it, since
        # the operator runs that explicitly after applying the migration).
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.migguard.outputs.blocked != 'true'
        run: |
          for app in engine api mcp; do
            echo "::group::deploy $app"
            pnpm exec wrangler deploy -c "apps/$app/wrangler.prod.jsonc"
            echo "::endgroup::"
          done
      - name: Validate deploy (dry-run)
        if: github.event_name == 'pull_request'
        run: |
          for app in engine api mcp; do
            echo "::group::dry-run $app"
            pnpm exec wrangler deploy --dry-run -c "apps/$app/wrangler.prod.jsonc"
            echo "::endgroup::"
          done
