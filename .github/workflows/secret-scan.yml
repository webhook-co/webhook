name: Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Job name is the required status check context referenced by the ruleset: "gitleaks".
  # Complements GitHub-native secret scanning + push protection with a CI-side gate.
  #
  # We invoke the gitleaks binary directly rather than gitleaks/gitleaks-action@v2, because
  # that action requires a paid GITLEAKS_LICENSE for GitHub *organization* repos and would
  # otherwise fail this required check. The binary is Apache-2.0 and needs no license.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          set -euo pipefail
          version="$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oP '"tag_name":\s*"v\K[^"]+')"
          echo "Using gitleaks v${version}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --no-banner --verbose --exit-code 1
