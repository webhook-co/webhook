name: deploy-telemetry

# Deploys the wbhk CLI telemetry collector Worker (apps/telemetry → `webhook-telemetry`) on telemetry.wbhk.my.
# Mirrors deploy-get/deploy-www: the org blocks 3rd-party Marketplace actions, so this calls wrangler directly
# via pnpm; only actions/* (SHA-pinned). wrangler is a root devDep. Not a required status check.
#
#   push to main  -> deploy production (telemetry.wbhk.my)
#   pull_request  -> `wrangler deploy --dry-run`

on:
  push:
    branches: [main]
    paths:
      - "apps/telemetry/**"
      - ".github/workflows/deploy-telemetry.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/telemetry/**"
      - ".github/workflows/deploy-telemetry.yml"
      - "pnpm-lock.yaml"

permissions:
  contents: read

concurrency:
  group: deploy-telemetry-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy-telemetry
    runs-on: ubuntu-latest
    # Same-repo only: fork PRs don't receive secrets.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Deploy production (telemetry.wbhk.my)
        if: github.event_name == 'push'
        run: pnpm --filter @webhook-co/telemetry exec wrangler deploy
      - name: Validate deploy (dry-run)
        if: github.event_name == 'pull_request'
        run: pnpm --filter @webhook-co/telemetry exec wrangler deploy --dry-run
