name: Auto-assign PR

# Assigns every new PR to the repo's code owner (the `*` rule in CODEOWNERS) and requests
# review from that owner.
#
# Why both: a CODEOWNERS file never sets the PR *assignee*, so we set it here to give every
# PR a clear owner on the board. We also request review from the owner so it's explicit and
# consistent (idempotent with whatever the branch ruleset already requests). GitHub forbids
# requesting the PR *author* as a reviewer, so on the owner's own PRs they're assigned but
# not review-requested — you can't review your own PR.
#
# Security notes:
#   - `pull_request` (not `pull_request_target`): for PRs from forks the GITHUB_TOKEN is
#     read-only, so neither assignment nor review requests can happen there. We skip forks
#     explicitly rather than fail (see the job `if:`). Same-repo PRs — the normal flow — work.
#   - Least privilege: only `pull-requests: write` (+ read to checkout CODEOWNERS).
#   - No untrusted PR fields are interpolated into shell; all logic runs in github-script
#     against the typed `context`/`github` objects, so there's no script-injection surface.

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-assign-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  assign:
    name: assign
    runs-on: ubuntu-latest
    # GITHUB_TOKEN is read-only on fork PRs, so assignment only works for same-repo PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # Only the CODEOWNERS file is needed; sparse-checkout keeps it cheap.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            .github/CODEOWNERS
            CODEOWNERS
            docs/CODEOWNERS
          sparse-checkout-cone-mode: false

      - name: Assign and request review from the code owner
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');

            // CODEOWNERS can live in any of these locations (GitHub checks them in order).
            const candidates = ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS'];
            const path = candidates.find((p) => fs.existsSync(p));
            if (!path) {
              core.notice('No CODEOWNERS file found; nothing to do.');
              return;
            }

            // Find owners of the catch-all `*` rule. CODEOWNERS is last-match-wins, so we
            // scan top-to-bottom and keep the owners from the last `*` line we see.
            let owners = [];
            for (const raw of fs.readFileSync(path, 'utf8').split('\n')) {
              const line = raw.replace(/#.*$/, '').trim();
              if (!line) continue;
              const [pattern, ...rest] = line.split(/\s+/);
              if (pattern === '*') owners = rest;
            }

            // We only handle individual users here; @org/team handles use different APIs
            // (no assignee support; `team_reviewers` for review) and are out of scope.
            const users = owners
              .filter((o) => o.startsWith('@') && !o.includes('/'))
              .map((o) => o.slice(1));

            if (users.length === 0) {
              core.notice(`No individual user owner found in ${path} for the '*' rule.`);
              return;
            }

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;

            // --- Assign the code owner(s) ------------------------------------------
            // GitHub can assign any user (including the PR author) as an assignee, so we
            // don't special-case "author is the owner" here — unlike review requests below.
            const assigned = new Set((pr.assignees || []).map((a) => a.login.toLowerCase()));
            const toAssign = users.filter((u) => !assigned.has(u.toLowerCase()));

            if (toAssign.length === 0) {
              core.info('Code owner already assigned; nothing to do.');
            } else {
              const res = await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: number,
                assignees: toAssign,
              });
              const got = (res.data.assignees || []).map((a) => a.login);
              // GitHub silently ignores assignees without repo access; warn if that happened.
              const ignored = toAssign.filter(
                (u) => !got.some((a) => a.toLowerCase() === u.toLowerCase()),
              );
              if (ignored.length > 0) {
                core.warning(
                  `Could not assign (no repo access?): ${ignored.join(', ')}. ` +
                    `Assigned: ${got.join(', ') || 'none'}.`,
                );
              } else {
                core.info(`Assigned PR #${number} to: ${toAssign.join(', ')}`);
              }
            }

            // --- Request review from the code owner(s) -----------------------------
            // GitHub rejects a request that includes the PR author (422 "Review cannot be
            // requested from pull request author"), so drop the author. Expected on the
            // owner's own PRs: assigned above, but never review-requested here. Idempotent:
            // skip anyone already on the request.
            const author = (pr.user?.login || '').toLowerCase();
            const requested = new Set(
              (pr.requested_reviewers || []).map((r) => r.login.toLowerCase()),
            );
            const toReview = users.filter(
              (u) => u.toLowerCase() !== author && !requested.has(u.toLowerCase()),
            );

            if (toReview.length === 0) {
              core.info('No new reviewers to request (author-owned PR or already requested).');
              return;
            }

            // Best-effort: a stray 422/403 (e.g. a reviewer who lacks repo access) shouldn't
            // fail the job — the assignment above already succeeded.
            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number: number,
                reviewers: toReview,
              });
              core.info(`Requested review on PR #${number} from: ${toReview.join(', ')}`);
            } catch (err) {
              core.warning(
                `Could not request review from ${toReview.join(', ')}: ${err.message}`,
              );
            }
